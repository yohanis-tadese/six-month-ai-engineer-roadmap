<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engineer Roadmap</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="url(#lg)"/>
            <path d="M10 16a6 6 0 1 1 12 0 6 6 0 0 1-12 0z" stroke="#fff" stroke-width="2"/>
            <path d="M16 10v2M16 20v2M10 16H8M24 16h-2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <circle cx="16" cy="16" r="2" fill="#fff"/>
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#22d3ee"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">AI Roadmap</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">Y</div>
        <div class="user-info">
          <div class="user-name" id="userName">AI Engineer</div>
          <div class="user-role">Full-Stack → AI Engineer</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="#" class="nav-item active" data-page="dashboard" title="Dashboard">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
                <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
              </svg>
              <span class="nav-label">Dashboard</span>
            </a>
          </li>
          <li>
            <a href="#" class="nav-item" data-page="roadmap" title="Roadmap">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zm10.586 0L12 5.586v12.828l2.293 2.293A1 1 0 0016 20V4a1 1 0 00-.707-.293z" clip-rule="evenodd"/>
              </svg>
              <span class="nav-label">Roadmap</span>
            </a>
          </li>
          <li>
            <a href="#" class="nav-item" data-page="settings" title="Settings">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
              </svg>
              <span class="nav-label">Settings</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="overall-progress-mini">
          <div class="progress-label-row">
            <span>Overall Progress</span>
            <span id="sidebarProgressText">0%</span>
          </div>
          <div class="mini-bar">
            <div class="mini-bar-fill" id="sidebarProgress" style="width:0%"></div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="page-loader">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/roadmap-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
